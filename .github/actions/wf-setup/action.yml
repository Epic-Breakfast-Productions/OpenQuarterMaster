name: 'WF - setup runner'
description: 'sets up java on the runner'
runs:
  using: composite
  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Maven local repository
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/build.gradle', '**/settings.gradle') }}
        restore-keys: |
          ${{ runner.os }}-maven-


