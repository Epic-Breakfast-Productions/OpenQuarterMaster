name: WF - Quarkus CI Pipeline

on:
  workflow_call:
    inputs:
      path:
        description: 'Path to the service root relative to repo root (e.g. software/core/oqm-core-api)'
        required: true
        type: string
      java-version:
        description: 'Java version to build with'
        default: '21'
        type: string
      run-int-tests:
        description: 'Whether to run integration tests'
        default: true
        type: boolean
      container-based-int-tests:
        description: 'Whether integration tests require a container image build'
        default: false
        type: boolean
      jacoco-min-coverage-overall:
        description: 'Minimum overall JaCoCo line coverage percentage (0-100)'
        default: 60
        type: number
      jacoco-min-coverage-changed:
        description: 'Minimum JaCoCo line coverage percentage for changed files (0-100)'
        default: 80
        type: number

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            uploads.github.com:443
            api.adoptium.net:443
            plugins.gradle.org:443
            services.gradle.org:443
            repo1.maven.org:443
            jcenter.bintray.com:443

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup runner
        uses: ./.github/actions/setup-quarkus-runner
        with:
          java-version: ${{ inputs.java-version }}
          cache-read-only: false

      - name: Build (skip tests)
        working-directory: ${{ inputs.path }}
        run: ./gradlew build -x test


  unit-test:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            uploads.github.com:443
            api.adoptium.net:443
            plugins.gradle.org:443
            services.gradle.org:443
            repo1.maven.org:443
            jcenter.bintray.com:443

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup runner
        uses: ./.github/actions/setup-quarkus-runner
        with:
          java-version: ${{ inputs.java-version }}
          cache-read-only: true

      - name: Run unit tests
        working-directory: ${{ inputs.path }}
        run: ./gradlew test jacocoTestReport

      - name: Publish unit test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: ${{ inputs.path }}/build/test-results/test/*.xml
          reporter: java-junit

      - name: Check JaCoCo coverage
        uses: madrapps/jacoco-report@v1.7.1
        if: always()
        with:
          paths: ${{ inputs.path }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage
          min-coverage-overall: ${{ inputs.jacoco-min-coverage-overall }}
          min-coverage-changed-files: ${{ inputs.jacoco-min-coverage-changed }}

      - name: Archive coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ${{ inputs.path }}/build/reports/jacoco/test
          retention-days: 7

      - name: Archive unit test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: ${{ inputs.path }}/build/reports/tests/test
          retention-days: 7


  int-test:
    name: Integration Tests
    needs: build
    runs-on: ubuntu-latest
    if: ${{ inputs.run-int-tests }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            uploads.github.com:443
            api.adoptium.net:443
            plugins.gradle.org:443
            services.gradle.org:443
            repo1.maven.org:443
            jcenter.bintray.com:443

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup runner
        uses: ./.github/actions/setup-quarkus-runner
        with:
          java-version: ${{ inputs.java-version }}
          cache-read-only: true

      - name: Run integration tests
        working-directory: ${{ inputs.path }}
        run: ./gradlew quarkusIntTest -x test -Pquarkus.container-image.build=${{ inputs.container-based-int-tests }}

      - name: Publish integration test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Test Results
          path: ${{ inputs.path }}/build/test-results/quarkusIntTest/*.xml
          reporter: java-junit

      - name: Archive integration test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: int-test-report
          path: ${{ inputs.path }}/build/reports/tests/quarkusIntTest
          retention-days: 7
