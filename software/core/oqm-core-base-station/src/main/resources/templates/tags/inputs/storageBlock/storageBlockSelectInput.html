
<div class="storageBlockInput" id="{id}-storageBlockInput">
	{#if includeLabel?? }
		<label for="{id}-storageBlockInputSearchButton" class="form-label">{#icons/storageBlock /}{#if labelPrefix??}{labelPrefix}{/if} Storage Block</label>
	{/if}
	<div class="input-group">
		<input type="hidden" class="idInput" id="{id}-storageBlockInputId" name="{#if blockIdName??}{blockIdName}{#else}storageBlock{/if}">
		<button class="btn btn-outline-secondary searchButton" id="{id}-storageBlockInputSearchButton" type="button"  data-bs-toggle="modal" data-bs-target="#storageSearchSelectModal" onclick="StorageSearchSelect.setupSearch(this);">{#icons/search}{/icons/search}</button>
		<input type="text" class="form-control nameInput" id="{id}-storageBlockInputName" placeholder="{#if labelPrefix??}{labelPrefix} {/if}Storage Block" name="storageBlockName" aria-describedby="{id}-storageBlockNameInput-help" readonly>
		<button class="btn btn-outline-secondary clearButton" type="button" id="{id}-storageBlockInputClearButton" onclick="StorageSearchSelect.input.clear($(this));">{#icons/remove /}</button>
	</div>
	{#if helpText??}
		<div id="{id}-storageBlockNameInput-help" class="form-text">{helpText}</div>
	{/if}
</div>
