<div class="mb-3 col col-3">
	<label for="{id}-storageBlockInputSearchButton" class="form-label">{#icons/storageBlock /} Storage Block</label>
	<div class="input-group storageBlockInput" id="{id}-storageBlockInput">
		<input type="hidden" class="idInput" id="{id}-storageBlockInputId" name="{#if blockIdName??}{blockIdName}{#else}storageBlock{/if}">
		<button class="btn btn-outline-secondary searchButton" id="{id}-storageBlockInputSearchButton" type="button"  data-bs-toggle="modal" data-bs-target="#storageSearchSelectModal" onclick="StorageSearchSelect.setupStorageSearchModal('{id}-storageBlockInput', this);StorageSearchSelect.storageSearchSelectForm.submit();">{#icons/search}{/icons/search}</button>
		<input type="text" class="form-control nameInput" id="{id}-storageBlockInputName" placeholder="Storage Block" name="storageBlockName" aria-describedby="{id}-storageBlockNameInput-help" readonly>
		<button class="btn btn-outline-secondary clearButton" type="button" id="{id}-storageBlockInputClearButton" onclick="ItemSearchSelect.clearSearchInput($(this));">{#icons/remove /}</button>
	</div>
	{!<div id="{id}-storageBlockNameInput-help" class="form-text"></div>!}
</div>
