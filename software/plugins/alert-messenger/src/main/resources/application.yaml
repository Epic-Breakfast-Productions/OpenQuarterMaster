
quarkus:
  container-image:
    name: oqm-plugin-alert_messenger
    group: ebprod

  log:
    console:
      format: "%d{HH:mm:ss} [%-5p][%-16X{traceId}|%-2X{parentId}|%-16X{spanId}|%-5X{sampled}][%-40c{2.}|%-26t]():: %s%e%n"
    category:
      "io.quarkus.mailer":
        level: DEBUG
  oidc:
    application-type: hybrid
    token-state-manager:
      split-tokens: true
    logout:
      path: /logout
  
  keycloak:
    devservices:
      port: 9328
      realm-path: "dev/oqm-realm.json"
      realm-name: oqm
  
  

  # Mailer configuration for Gmail SMTP server.
  # Configures the SMTP server for sending email notifications.
  mailer:
#    auth-methods: "DIGEST-MD5 CRAM-SHA256 CRAM-SHA1 CRAM-MD5 PLAIN LOGIN"
#    from: "oqm.alert.messenger@gmail.com"
#    host: "smtp.gmail.com"
#    port: 587
#    ssl: false
#    start-tls: REQUIRED
#    username: "${SMTP_USERNAME}"
#    password: "${SMTP_PASSWORD}"
#    mock: false

  # Database configuration below (for user credentials and preferences).
  # Configures the PostgreSQL database for storing user information and preferences.
  datasource:
    db-kind: postgresql
  hibernate-orm:
    database:
      generation: update

mp:
  messaging:
    incoming:
      oqm-core-all-events:
        connector: smallrye-kafka
        auto:
          offset:
            reset: earliest
#        value:
#          deserializer: tech.ebp.oqm.plugin.alertMessenger.ObjectNodeDeserializer

smallrye:
  jwt:
    always-check-authorization: true
    require-scope: false


"%dev":
  quarkus:
    http:
      port: 8080
      ssl-port: 8443
    oidc:
      client-id: oqm-app
      credentials:
        secret: "**********"
